<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список мастеров</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #F5E1E1;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .master-card {
            background: #FFFFFF;
            border-radius: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            padding: 1.8rem;
            border: 1px solid #D4D0CC;
        }
        h2 {
            font-weight: 700;
            color: #4A4A4A;
            letter-spacing: -0.3px;
        }
        .btn-danger {
            background: #E8C4C4;
            border: none;
            border-radius: 2rem;
            padding: 0.45rem 1.4rem;
            font-weight: 500;
            transition: 0.2s;
            color: #4A4A4A;
        }
        .btn-danger:hover {
            background: #dcb0b0;
            transform: translateY(-2px);
        }
        .table {
            border-radius: 1rem;
            overflow: hidden;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }
        .table thead th {
            background: #E8C4C4 !important;
            color: #4A4A4A;
            font-weight: 600;
            border-bottom: none;
            padding: 14px 12px;
        }
        .table tbody tr:hover {
            background-color: #F5E1E1;
        }
        .badge-car {
            background: #F5E1E1;
            color: #4A4A4A;
            border-radius: 2rem;
            padding: 0.3rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-block;
            margin: 0.2rem 0.2rem;
        }
        .car-list {
            max-width: 280px;
        }
        footer {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 2rem;
            color: #9b908b;
        }
        @media (max-width: 768px) {
            .master-card { padding: 1rem; }
            .table-responsive { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="master-card">
        <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
            <h2>Наши специалисты</h2>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-danger shadow-sm">Выйти</button>
            </form>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered align-middle">
                <thead>
                <tr>
                    <th>ФИО</th>
                    <th>Телефон</th>
                    <th>Специальность</th>
                    <th>Обслуживаемые машины</th>
                </tr>
                </thead>
                <tbody id="mastersList"></tbody>
            </table>
        </div>
        <footer>высококвалифицированные мастера с любовью к авто</footer>
    </div>
</div>

<script>
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    fetch('/api/user/masters')
        .then(res => res.json())
        .then(data => {
            let html = '';
            data.forEach(m => {
                let carModels = (m.carModels && m.carModels.length) ? m.carModels : [];
                let carsHtml = carModels.map(model => `<span class="badge-car">${escapeHtml(model)}</span>`).join(' ');
                if (carsHtml === '') carsHtml = '<span class="text-muted fst-italic">— не назначено —</span>';
                html += `<tr>
                            <td><strong>${escapeHtml(m.fullName)}</strong></td>
                            <td>${escapeHtml(m.phone)}</td>
                            <td>${escapeHtml(m.specialty)}</td>
                            <td class="car-list">${carsHtml}</td>
                         </tr>`;
            });
            document.getElementById('mastersList').innerHTML = html;
        });
</script>
</body>
</html>
