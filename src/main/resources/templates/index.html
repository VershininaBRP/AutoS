<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Автосервис</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #F5E1E1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 1rem;
        }
        .glass-card {
            background: #FFFFFF;
            border-radius: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            padding: 2rem 2rem;
            border: 1px solid #D4D0CC;
        }
        h1 {
            font-weight: 700;
            color: #4A4A4A;
            font-size: 2.2rem;
        }
        .lead {
            color: #6b5f5a;
            font-weight: 400;
        }
        h3 {
            font-weight: 600;
            color: #4A4A4A;
            border-left: 4px solid #E8C4C4;
            padding-left: 0.8rem;
            margin-bottom: 1.2rem;
        }
        .form-control {
            border-radius: 2rem;
            border: 1px solid #D4D0CC;
            padding: 0.7rem 1.2rem;
            transition: all 0.2s;
            background: white;
        }
        .form-control:focus {
            border-color: #B8B1AC;
            box-shadow: 0 0 0 3px rgba(184, 177, 172, 0.3);
        }
        .btn-primary {
            background: #B8B1AC;
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            width: 100%;
            transition: 0.2s;
            color: #2c2c2c;
        }
        .btn-primary:hover {
            background: #a09a95;
            transform: translateY(-2px);
        }
        .btn-success {
            background: #B8B1AC;
            border: none;
            border-radius: 2rem;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            width: 100%;
            color: #2c2c2c;
        }
        .btn-success:hover {
            background: #a09a95;
            transform: translateY(-2px);
        }
        .alert {
            border-radius: 2rem;
            border: none;
            font-weight: 500;
        }
        hr {
            background: linear-gradient(90deg, #E8C4C4, #D4D0CC, #E8C4C4);
            height: 2px;
            opacity: 0.5;
        }
        @media (max-width: 768px) {
            .glass-card { padding: 1.5rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="glass-card">
                <div class="text-center mb-4">
                    <h1>Добро пожаловать в автосервис<br>«ByVershinina»</h1>
                    <p class="lead">Профессиональный ремонт и обслуживание автомобилей</p>
                    <hr>
                </div>
                <div class="row g-4">
                    <div class="col-md-6">
                        <h3>Вход</h3>
                        <form action="/login" method="post" autocomplete="off">
                            <input type="text" name="username" class="form-control mb-3" placeholder="Логин" required>
                            <input type="password" name="password" class="form-control mb-3" placeholder="Пароль" required>
                            <button class="btn btn-primary">Войти в систему</button>
                        </form>
                    </div>
                    <div class="col-md-6">
                        <h3>Регистрация (клиент)</h3>
                        <form action="/register" method="post" autocomplete="off">
                            <input type="text" name="username" class="form-control mb-3" placeholder="Логин" required>
                            <input type="password" name="password" class="form-control mb-3" placeholder="Пароль" required>
                            <input type="password" name="confirmPassword" class="form-control mb-3" placeholder="Подтвердите пароль" required>
                            <input type="text" name="phone" class="form-control mb-3" placeholder="Телефон (уникальный)" required>
                            <button class="btn btn-success">Зарегистрироваться</button>
                        </form>
                    </div>
                </div>
                <div th:if="${param.error}" class="alert alert-danger mt-4 text-center">Ошибка входа или регистрации. Проверьте данные.</div>
                <div th:if="${param.success}" class="alert alert-success mt-4 text-center">Регистрация успешна! Теперь войдите.</div>
                <div class="text-center mt-4 text-muted small">ваш надёжный автосервис</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
